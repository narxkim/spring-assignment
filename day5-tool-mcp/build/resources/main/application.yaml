spring:
  application:
    name: day5-tool-mcp
  ai:
    mcp:
      client:
        request-timeout: 30s
        stdio:
          connections:
            filesystem:
              command: npx.cmd
              args:
                - "-y"
                - "@modelcontextprotocol/server-filesystem"
                - "${user.dir}/mcp-sandbox"

            fetch:
              command: uvx
              args:
                - "mcp-server-fetch"

    google:
      genai:
        api-key: ${GOOGLE_API_KEY}  # 환경변수
        chat:
          model: gemini-3.1-flash-lite
          temperature: 0.7

    chat:
      memory:
        repository:
          jdbc:
            initialize-schema: always


  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

  web:
    error:
      include-message: always


logging:
  level:
    org.springframework.ai.chat.client.advisor: DEBUG
    org.springframework.ai.tool: TRACE