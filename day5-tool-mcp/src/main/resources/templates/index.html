<!DOCTYPE html>
<html lang="ko"
      xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>MCP AI Travel Planner</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>

<body>

<div class="container">

    <header>
        <div class="header-top">
            <h1>🧳 MCP AI Travel Planner</h1>

            <button id="newChatBtn">
                + 새 대화
            </button>
        </div>

        <p>Tool Calling + MCP + Chat Memory 기반 여행 플래너</p>
    </header>

    <main>

        <section class="chat-history" id="chatHistory">

            <div class="message ai">
                <div class="profile">🤖</div>

                <div class="bubble">
                    안녕하세요! 여행 조건을 입력하면 맞춤형 여행 일정을 추천해드릴게요.
                    <br><br>
                    예시: 부산 1박 2일 힐링 여행 추천해줘. 예산은 15만원이고 대중교통으로 이동할 거야.
                </div>
            </div>

        </section>

        <section class="chat-box">

            <textarea
                    id="question"
                    placeholder="예) 부산 1박 2일 힐링 여행 추천해줘. 예산은 15만원이고 대중교통으로 이동할 거야."></textarea>

            <button id="sendBtn">
                여행 일정 생성
            </button>

        </section>

    </main>

</div>

<script th:src="@{/js/app.js}"></script>

</body>
</html>
