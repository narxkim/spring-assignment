<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>강의자료 요약하기</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>

  <div class="container">

    <h1>📚 Lecture Summary AI</h1>

    <form id="summaryForm">

      <label>PDF 파일 업로드</label>

      <input
              type="file"
              id="file"
              name="file"
              accept="application/pdf">

      <button type="submit">
        요약하기
      </button>

    </form>

    <div class="result-card">

      <h2>📄 강의 요약</h2>

      <div id="result" class="result-content">
        <p class="empty-message">아직 결과가 없습니다.</p>
      </div>
    </div>

  </div>

  <script src="/js/script.js"></script>

</body>
</html>
