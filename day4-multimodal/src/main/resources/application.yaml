spring:
  application:
    name: day4-multimodal
  ai:
    google:
      genai:
        api-key: ${GOOGLE_API_KEY}  # 환경변수
        chat:
          model: gemini-3.1-flash-lite
          temperature: 0.7

    chat:
      memory:
        repository:
          jdbc:
            initialize-schema: always


  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

  web:
    error:
      include-message: always


logging:
  level:
    org.springframework.ai.chat.client.advisor: DEBUG